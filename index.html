---
layout: default
title: Thoughts and ideas (some better than others)
---
<p class="intro">
    Thoughts And Ideas: Some Better Than Others
</p>

{{ site.description }}

<div class="listing">
  {% for post in paginator.posts %}
    <div class="post other link">
    <h2>
      <span class="mega-octicon octicon-file-text" style="min-width: 32px;"></span>
      <a href="{{post.url}}">
        {{ post.title }}
      </a>
    </h2>

    <p class="post-date">{{ post.date | date_to_string }}</p>

    {{ post.excerpt }}
    </div>
  {% endfor %}
</div>
